name: task_ai
description: "TaskAI v3.0 - Gestión de tareas con IA on-device y persistencia Firebase."
publish_to: 'none'

version: 3.0.0+3

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  google_mlkit_barcode_scanning: ^0.12.0
  camera: ^0.11.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.0.0
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # Local cache
  hive_flutter: ^1.1.0
  # Connectivity
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
