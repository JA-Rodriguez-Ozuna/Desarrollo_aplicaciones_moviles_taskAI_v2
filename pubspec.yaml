name: task_ai
description: "TaskAI v2.0 - Gestión de tareas universitaria con IA on-device."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^15.1.2
  uuid: ^4.5.1
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  google_mlkit_barcode_scanning: ^0.12.0
  camera: ^0.11.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
